# ============================================
# Docker Compose — Task Manager SPA
# ============================================
#
# Три сервиса:
#
# 1. app (PHP-FPM)
#    - Собирается из docker/php/Dockerfile
#    - Содержит Laravel + скомпилированный Vue
#    - Подключается к MySQL
#
# 2. nginx
#    - Проксирует HTTP-запросы на PHP-FPM
#    - Отдаёт статику (CSS, JS)
#    - Порт: 8080 (хост) → 80 (контейнер)
#
# 3. mysql
#    - MySQL 8.0, данные сохраняются в Docker volume
#    - Порт: 3306 (хост) → 3306 (контейнер)
#

services:
  # --- PHP-FPM (Laravel) ---
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: task_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=task_manager
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tasknet

  # --- Nginx ---
  nginx:
    image: nginx:alpine
    container_name: task_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tasknet

  # --- MySQL ---
  mysql:
    image: mysql:8.0
    container_name: task_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: task_manager
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tasknet

networks:
  tasknet:
    driver: bridge

volumes:
  mysql_data:
