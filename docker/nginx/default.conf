# ============================================
# Nginx конфигурация для Laravel SPA
# ============================================
#
# Логика:
# 1. Статические файлы (CSS, JS, images) → отдаём напрямую
# 2. Файлы PHP → проксируем на php-fpm (контейнер app:9000)
# 3. Все остальные запросы → index.php (Laravel + Vue Router)
#
# try_files $uri $uri/ /index.php?$query_string
#   Сначала ищем файл, потом директорию, потом Laravel обработает.

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    # Максимальный размер тела запроса (для загрузки файлов)
    client_max_body_size 32M;

    # Основное правило: всё что не файл → Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Обработка PHP-файлов
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Запрет доступа к .htaccess и .env
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
